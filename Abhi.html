<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(0,0,0,0.3);
        }

        .navbar h1 {
            color: white;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        .menu a:hover {
            color: yellow;
        }

        .content {
            height: calc(100vh - 70px);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .box {
            background: rgba(0,0,0,0.4);
            padding: 40px;
            border-radius: 15px;
        }

        .box h2 {
            font-size: 38px;
            margin-bottom: 10px;
        }

        .box h3 {
            font-size: 26px;
            color: yellow;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 20px;
            background: yellow;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover {
            background: orange;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>My Website</h1>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <div class="content">
        <div class="box">
            <h2>Welcome! Everyone</h2>
            <h3>Abhishish Bhawsar These side</h3>
            <p>Glad to see you here 😊</p>
            <button class="btn">Get Started</button>
        </div>
    </div>

</body>
</html>
